<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Exam Proctor — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f7f5; --bg2:#f0eeeb; --surface:#ffffff;
  --text:#1a1a1a; --text2:#4a4a4a; --text3:#888;
  --M:#8B004A; --M10:rgba(139,0,74,.08); --M20:rgba(139,0,74,.18); --M50:rgba(139,0,74,.5);
  --red:#dc2626; --green:#16a34a; --amber:#d97706;
  --border:#e2ddd8;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;overflow-y:auto;padding:24px 0;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(139,0,74,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,0,74,.04) 1px,transparent 1px);background-size:44px 44px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(139,0,74,.06) 0%,transparent 70%);}
.corner{position:fixed;width:90px;height:90px;z-index:1;pointer-events:none;}
.corner.tl{top:18px;left:18px;border-top:1px solid var(--M20);border-left:1px solid var(--M20);}
.corner.tr{top:18px;right:18px;border-top:1px solid var(--M20);border-right:1px solid var(--M20);}
.corner.bl{bottom:18px;left:18px;border-bottom:1px solid var(--M20);border-left:1px solid var(--M20);}
.corner.br{bottom:18px;right:18px;border-bottom:1px solid var(--M20);border-right:1px solid var(--M20);}
.wrap{position:relative;z-index:10;width:100%;max-width:480px;padding:0 16px;display:flex;flex-direction:column;align-items:center;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:22px;}
.logo-ring{width:60px;height:60px;border-radius:50%;background:var(--M);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 6px 24px rgba(139,0,74,.22),0 0 0 6px rgba(139,0,74,.06);}
.logo-title{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:.08em;color:var(--text);}
.logo-title span{color:var(--M);}
.logo-sub{font-size:.6rem;letter-spacing:.18em;color:var(--text3);font-family:'Orbitron',sans-serif;margin-top:4px;}
.role-tabs{display:flex;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:18px;gap:4px;box-shadow:var(--shadow);}
.role-tab{flex:1;padding:10px;border-radius:7px;border:none;background:transparent;font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.12em;color:var(--text3);cursor:pointer;transition:all .2s;}
.role-tab.active{background:var(--M);color:#fff;box-shadow:0 2px 10px rgba(139,0,74,.25);}
.role-tab:not(.active):hover{background:var(--bg2);color:var(--text);}
.card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:var(--shadow);}
.form-section{display:none;}
.form-section.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.form-title{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.2em;color:var(--M);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.step{display:none;}
.step.active{display:block;animation:fadeIn .25s ease;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:600;}
.field input,.field select{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus{border-color:var(--M);box-shadow:0 0 0 3px rgba(139,0,74,.12);background:#fff;}
.field input::placeholder{color:#bbb;}
.field input:disabled{opacity:.5;cursor:not-allowed;}
.err{font-size:.7rem;color:var(--red);margin-top:-8px;margin-bottom:12px;padding:8px 11px;border-radius:7px;background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);display:none;}
.err.show{display:block;}
.succ{font-size:.7rem;color:var(--green);margin-bottom:12px;padding:8px 11px;border-radius:7px;background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.22);display:none;}
.succ.show{display:block;}
.btn-submit{width:100%;padding:13px;border:none;border-radius:8px;background:var(--M);color:#fff;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.16em;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(139,0,74,.22);margin-top:4px;}
.btn-submit:hover{box-shadow:0 6px 22px rgba(139,0,74,.32);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.info-note{font-size:.7rem;color:var(--text3);text-align:center;margin-top:12px;line-height:1.6;}
.info-note b{color:var(--M);cursor:pointer;font-weight:600;}
.info-note b:hover{text-decoration:underline;}
.fac-tabs{display:flex;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg);}
.fac-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:.74rem;font-weight:500;cursor:pointer;transition:all .2s;}
.fac-tab.active{background:var(--M10);color:var(--M);font-weight:600;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;font-size:.56rem;letter-spacing:.12em;color:var(--text3);font-family:'Orbitron',sans-serif;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="wrap">
<div class="logo-area">
  <div class="logo-ring"><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="11" stroke="#fff" stroke-width="1.4" opacity=".75"/><ellipse cx="14" cy="14" rx="8" ry="5" stroke="#fff" stroke-width="1.2" opacity=".55"/><circle cx="14" cy="14" r="3" fill="#fff" opacity=".95"/><circle cx="14" cy="14" r="1.2" fill="#8B004A"/></svg></div>
  <div class="logo-title">AI Exam <span>Proctor</span></div>
  <div class="logo-sub">SECURE EXAMINATION SYSTEM</div>
</div>
<div class="role-tabs">
  <button class="role-tab active" id="tab-student" onclick="switchRole('student')">🎓 &nbsp;STUDENT</button>
  <button class="role-tab" id="tab-faculty" onclick="switchRole('faculty')">👨‍🏫 &nbsp;FACULTY</button>
</div>
<div class="card">

  <!-- STUDENT -->
  <div class="form-section active" id="form-student">
    <div class="form-title">STUDENT SIGN IN</div>
    <div class="step active" id="s-step1">
      <div class="field"><label>Full Name</label><input type="text" id="s-name" placeholder="Enter your full name" autocomplete="off"/></div>
      <div class="field"><label>College ID</label><input type="text" id="s-id" placeholder="e.g. 23CS401" autocomplete="off"/></div>
      <div class="field"><label>Subject</label><input type="text" id="s-subject" placeholder="e.g. Data Structures" autocomplete="off"/></div>
      <div class="field"><label>Room / Exam Code (from Faculty)</label><input type="text" id="s-code" placeholder="Enter 6-digit code" maxlength="6" autocomplete="off" style="letter-spacing:.2em;font-family:'Orbitron',sans-serif;font-size:1rem;text-transform:uppercase;"/></div>
      <div class="field"><label>Email Address</label><input type="email" id="s-email" placeholder="your@email.com" autocomplete="off"/></div>
      <div class="field"><label>Password</label><input type="password" id="s-password" placeholder="••••••••"/></div>
      <div class="err" id="s-err1">Please fill all fields correctly.</div>
      <button class="btn-submit" onclick="studentLogin()">JOIN EXAM SESSION →</button>
    </div>
  </div>

  <!-- FACULTY -->
  <div class="form-section" id="form-faculty">
    <div class="form-title">FACULTY ACCESS</div>
    <div class="fac-tabs">
      <button class="fac-tab active" id="fac-tab-login" onclick="facTab('login')">Sign In</button>
      <button class="fac-tab" id="fac-tab-reg" onclick="facTab('register')">Create Account</button>
    </div>
    <div class="step active" id="f-login">
      <div class="field"><label>Email Address</label><input type="email" id="f-email" placeholder="your@email.com" autocomplete="off"/></div>
      <div class="field"><label>Password</label><input type="password" id="f-pass" placeholder="••••••••"/></div>
      <div class="err" id="f-err">Email or password is incorrect.</div>
      <button class="btn-submit" onclick="facultyLogin()">ACCESS DASHBOARD →</button>
      <div class="info-note">No account? <b onclick="facTab('register')">Create one →</b></div>
    </div>
    <div class="step" id="f-register">
      <div class="field"><label>Full Name</label><input type="text" id="f-reg-name" placeholder="Prof. Your Name" autocomplete="off"/></div>
      <div class="field"><label>Email Address</label><input type="email" id="f-reg-email" placeholder="your@email.com" autocomplete="off"/></div>
      <div class="field"><label>Password (min 6 chars)</label><input type="password" id="f-reg-pass" placeholder="Create a password"/></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="f-reg-pass2" placeholder="Repeat password"/></div>
      <div class="err" id="f-reg-err">Please check your inputs.</div>
      <div class="succ" id="f-reg-succ">✓ Account created! Signing you in…</div>
      <button class="btn-submit" onclick="facultyRegister()">CREATE ACCOUNT →</button>
      <div class="info-note">Have account? <b onclick="facTab('login')">Sign in →</b></div>
    </div>
  </div>

</div>
<div class="status-bar"><span class="sdot"></span>SYSTEM ONLINE · AI PROCTORING READY</div>
</div>

<script>
function switchRole(r){['student','faculty'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('active',x===r);document.getElementById('form-'+x).classList.toggle('active',x===r);});}
function facTab(t){
  document.getElementById('fac-tab-login').classList.toggle('active', t==='login');
  document.getElementById('fac-tab-reg').classList.toggle('active', t==='register');
  document.getElementById('f-login').classList.toggle('active', t==='login');
  document.getElementById('f-register').classList.toggle('active', t==='register');
}
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function clearErr(id){document.getElementById(id).classList.remove('show');}

async function studentLogin(){
  clearErr('s-err1');
  const name    = document.getElementById('s-name').value.trim();
  const id      = document.getElementById('s-id').value.trim();
  const subject = document.getElementById('s-subject').value.trim();
  const code    = document.getElementById('s-code').value.trim().toUpperCase();
  const email   = document.getElementById('s-email').value.trim();
  const pass    = document.getElementById('s-password').value;
  if(!name||!id||!subject||!code||!email||!pass){showErr('s-err1','Please fill in all fields.');return;}
  if(id.length<3){showErr('s-err1','College ID too short.');return;}
  if(code.length!==6){showErr('s-err1','Room code must be 6 characters.');return;}
  if(!email.includes('@')){showErr('s-err1','Invalid email address.');return;}
  if(pass.length<6){showErr('s-err1','Password must be at least 6 characters.');return;}
  const btn=document.querySelector('#form-student .btn-submit');
  btn.disabled=true; btn.textContent='Joining…';
  try{
    const session = await fb_studentLogin(name,id,subject,code,email,pass);
    sessionStorage.setItem('proctor_session', JSON.stringify(session));
    window.location.href='index.html';
  }catch(e){
    showErr('s-err1', e.message||'Login failed.');
    btn.disabled=false; btn.textContent='JOIN EXAM SESSION →';
  }
}

async function facultyLogin(){
  clearErr('f-err');
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  const pass  = document.getElementById('f-pass').value;
  if(!email||!pass){showErr('f-err','Please enter email and password.');return;}
  const btn=document.querySelector('#f-login .btn-submit');
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const data = await fb_facultyLogin(email,pass);
    sessionStorage.setItem('proctor_session', JSON.stringify({role:'faculty',name:data.name,email:data.email,loginTime:new Date().toISOString()}));
    window.location.href='faculty.html';
  }catch(e){
    showErr('f-err', e.message||'Login failed.');
    btn.disabled=false; btn.textContent='ACCESS DASHBOARD →';
  }
}

async function facultyRegister(){
  clearErr('f-reg-err');document.getElementById('f-reg-succ').classList.remove('show');
  const name  = document.getElementById('f-reg-name').value.trim();
  const email = document.getElementById('f-reg-email').value.trim().toLowerCase();
  const pass  = document.getElementById('f-reg-pass').value;
  const pass2 = document.getElementById('f-reg-pass2').value;
  if(!name||!email||!pass||!pass2){showErr('f-reg-err','Fill in all fields.');return;}
  if(!email.includes('@')){showErr('f-reg-err','Invalid email.');return;}
  if(pass.length<6){showErr('f-reg-err','Password must be at least 6 characters.');return;}
  if(pass!==pass2){showErr('f-reg-err','Passwords do not match.');return;}
  const btn=document.querySelector('#f-register .btn-submit');
  btn.disabled=true; btn.textContent='Creating…';
  try{
    await fb_facultyRegister(name,email,pass);
    document.getElementById('f-reg-succ').classList.add('show');
    setTimeout(()=>{facTab('login');document.getElementById('f-email').value=email;},1500);
  }catch(e){
    showErr('f-reg-err', e.message||'Registration failed.');
  }
  btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('form-faculty').classList.contains('active')){
    if(document.getElementById('f-login').classList.contains('active'))facultyLogin();else facultyRegister();
  }else{
    studentLogin();
  }
});
</script>
</body>
</html>
